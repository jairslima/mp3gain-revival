name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    name: Build and Test (Windows / MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mpg123 via vcpkg
        run: |
          vcpkg install mpg123:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Configure CMake
        run: |
          $vcpkg = $env:VCPKG_INSTALLATION_ROOT
          cmake -S project -B build `
            -DMPG123_INCLUDE_DIR="$vcpkg/installed/x64-windows/include" `
            -DMPG123_LIBRARY="$vcpkg/installed/x64-windows/lib/mpg123.lib"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Copy runtime DLL
        run: |
          $vcpkg = $env:VCPKG_INSTALLATION_ROOT
          Copy-Item "$vcpkg/installed/x64-windows/bin/mpg123.dll" "build/Release/"
        shell: pwsh

      - name: Run smoke tests
        run: bash test/smoke_test.sh
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3gain-windows-x64
          path: |
            build/Release/mp3gain.exe
            build/Release/mpg123.dll
