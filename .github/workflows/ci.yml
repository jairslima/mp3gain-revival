name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    name: Build and Test (Windows / MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (vcpkg manifest installs mpg123 automatically)
        run: |
          cmake -S project -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Copy runtime DLL
        run: |
          $dll = Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\mpg123.dll" -ErrorAction SilentlyContinue
          if ($dll) {
            Copy-Item $dll.FullName "build\Release\"
          } else {
            # fallback: search vcpkg_installed in repo
            $dll2 = Get-ChildItem "vcpkg_installed" -Recurse -Filter "mpg123.dll" | Select-Object -First 1
            if ($dll2) { Copy-Item $dll2.FullName "build\Release\" }
          }
        shell: pwsh

      - name: Run smoke tests
        run: bash test/smoke_test.sh
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3gain-windows-x64
          path: |
            build/Release/mp3gain.exe
            build/Release/mpg123.dll
