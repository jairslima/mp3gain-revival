name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    name: Build and Test (Windows / MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg at baseline commit
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'efa4634bd526b87559684607d2cbbdeeec0f07d8'

      - name: Configure CMake
        run: |
          cmake -S project -B build `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_DIR="${{ github.workspace }}"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Copy runtime DLL
        run: |
          $dll = Get-ChildItem "${{ github.workspace }}\vcpkg\installed\x64-windows\bin\mpg123.dll" -ErrorAction SilentlyContinue
          if ($dll) {
            Copy-Item $dll.FullName "build\Release\"
          } else {
            Write-Warning "mpg123.dll not found in vcpkg installed -- smoke tests may fail"
          }
        shell: pwsh

      - name: Run smoke tests
        run: bash test/smoke_test.sh
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3gain-windows-x64
          path: |
            build/Release/mp3gain.exe
            build/Release/mpg123.dll
